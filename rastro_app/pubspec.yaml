name: rastro
description: "A new Flutter project."
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.2.1
  flutter_lucide: ^1.8.2
  flutter_svg: ^2.2.4
  go_router: ^17.1.0
  firebase_core: ^4.6.0

  design_system:
    path: ../design_system
  live_map:
    path: ../live_map
  network:
    path: ../network

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/config/
    - assets/models/
    - assets/images/
    - assets/svgs/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Black.ttf
          weight: 900
